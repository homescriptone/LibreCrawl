name: Build & Push Docker Image

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:            # lets you trigger manually from the GH UI

env:
  # --- Choose ONE registry block and delete the other ---

  # Option A: Google Artifact Registry
  # GAR_LOCATION: us-central1
  # GAR_REPO: librecrawl                        # create this repo in GCP first
  # IMAGE: ${{ vars.GAR_LOCATION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ vars.GAR_REPO }}/librecrawl

  # Option B: Docker Hub  (uncomment + delete Option A)
  IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/librecrawl

jobs:
  build-and-push:
    name: Build & Push
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write          # needed for Workload Identity auth to GCP

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v4

      # ── 2. Set up Docker Buildx (multi-arch + cache support) ───────────────
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ══════════════════════════════════════════════════════════════════════
      # OPTION A — Google Artifact Registry
      # Requires secrets: GCP_PROJECT_ID, GCP_WORKLOAD_IDENTITY_PROVIDER,
      #                   GCP_SERVICE_ACCOUNT
      # ══════════════════════════════════════════════════════════════════════
      # - name: Authenticate to Google Cloud
      #   uses: google-github-actions/auth@v2
      #   with:
      #     workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
      #     service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}
      #
      # - name: Configure Docker for Artifact Registry
      #   run: gcloud auth configure-docker ${{ env.GAR_LOCATION }}-docker.pkg.dev --quiet

      # ══════════════════════════════════════════════════════════════════════
      # OPTION B — Docker Hub
      # Requires secrets: DOCKERHUB_USERNAME, DOCKERHUB_TOKEN
      # ══════════════════════════════════════════════════════════════════════
      - name: Log in to Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # ── 3. Generate image tags ─────────────────────────────────────────────
      # Produces tags like:
      #   yourusername/librecrawl:latest          (on main push)
      #   yourusername/librecrawl:v1.2.3          (on tag push)
      #   yourusername/librecrawl:sha-abc1234     (always)
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      # ── 4. Build (and push on non-PR) ─────────────────────────────────────
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Cache layers between runs so Playwright deps don't re-download every time
          cache-from: type=gha
          cache-to: type=gha,mode=max
          # Uncomment for multi-arch (linux/arm64 is needed for Apple Silicon dev boxes
          # or GCP Tau T2A instances):
          # platforms: linux/amd64,linux/arm64

      # ── 5. Print image digest for traceability ─────────────────────────────
      - name: Image digest
        run: echo "Pushed ${{ steps.meta.outputs.tags }}"